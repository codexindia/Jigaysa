name: Deploy


on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  # Allow manual deploys (e.g. when CI was skipped with [skip ci]).
  workflow_dispatch:

# Never let two deploys overlap on the server.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Gate on CI success. (Manual re-runs of this workflow won't have a
    # conclusion, so allow those through too.)
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    # Use a GitHub Environment so you can require approvals / store env-scoped
    # secrets. Create it under Settings → Environments → "production".
    environment: development

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          # Fail the step if any remote command fails.
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.PROJECT_DIR }}

            echo "==> Pulling latest code"
            
            
            git fetch origin main
            git reset --hard origin/main

            echo "==> Activating virtualenv"
            source .venv/bin/activate

            # echo "==> Installing dependencies"
            # pip install -r requirements.txt

            echo "==> Running database migrations"
            python manage.py migrate --noinput

            echo "==> Collecting static files"
            python manage.py collectstatic --noinput

            echo "==> Restarting application service"
            sudo systemctl restart ${{ secrets.SERVICE_NAME }}

            echo "==> Deploy complete"
